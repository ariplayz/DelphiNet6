title: DelphiNet 6
description: Modern school portal — TypeScript, React, NestJS, PostgreSQL.
remote_theme: just-the-docs/just-the-docs

url: https://ariplayz.github.io
baseurl: /DelphiNet6

# just-the-docs theme settings
color_scheme: dark
search_enabled: true
heading_anchors: true

aux_links:
  "GitHub":
    - "https://github.com/ariplayz/DelphiNet6"

aux_links_new_tab: true

footer_content: >-
  Copyright &copy; 2026 DelphiNet 6 contributors.
  Distributed under the project license.

callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

exclude:
  - README.md
  - PROGRESS.md          # rendered at /progress via progress.md
